version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: freelanceflow-db
    environment:
      POSTGRES_USER: freelancer
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: freelanceflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freelancer"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
