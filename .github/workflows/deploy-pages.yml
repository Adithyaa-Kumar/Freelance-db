name: Deploy Pages Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          cd frontend && npm install && cd ..

      - name: Build frontend
        run: npm run build:frontend
        env:
          VITE_API_BASE_URL: https://freelanceflow-api.adithyaa-kumar.workers.dev
          VITE_ENVIRONMENT: production

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: freelanceflow
          directory: frontend/dist
          productionBranch: main

      - name: Deployment notification
        if: success()
        run: echo "✅ Frontend deployed successfully to Cloudflare Pages"

      - name: Deployment failure notification
        if: failure()
        run: echo "❌ Frontend deployment failed"
