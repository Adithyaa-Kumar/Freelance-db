name = "freelanceflow-api"
main = "backend/src/worker.js"
account_id = "b75373d33ed51fe68bd4f29032140bb8"
compatibility_date = "2024-01-01"
workers_dev = true

# -----------------------------
# BUILD CONFIGURATION
# -----------------------------
[build]
command = "npm run build"
cwd = "./backend"

# -----------------------------
# PRODUCTION ENVIRONMENT
# -----------------------------
[env.production]
name = "freelanceflow-api-production"
workers_dev = true

[env.production.vars]
ENVIRONMENT = "production"
CORS_ORIGIN = "https://freelanceflow.pages.dev"
JWT_EXPIRE = "7d"

# -----------------------------
# STAGING ENVIRONMENT
# -----------------------------
[env.staging]
name = "freelanceflow-api-staging"
workers_dev = true

[env.staging.vars]
ENVIRONMENT = "staging"
CORS_ORIGIN = "https://freelance-db-staging.pages.dev"
JWT_EXPIRE = "7d"

# -----------------------------
# DEVELOPMENT ENVIRONMENT
# -----------------------------
[env.development]
name = "freelanceflow-api-dev"
workers_dev = true

[env.development.vars]
ENVIRONMENT = "development"
CORS_ORIGIN = "http://localhost:5173"
JWT_EXPIRE = "7d"

# -----------------------------
# NOTES (DO NOT MODIFY BELOW)
# -----------------------------
# ❗ DO NOT add route or zone_id for workers.dev deployments
# ❗ routes + zone_id are ONLY for custom domains
# ❗ workers.dev URL is automatically handled by Cloudflare

# -----------------------------
# SECRETS (SET VIA CLI)
# -----------------------------
# Run these commands locally (NOT in this file):
#
# npx wrangler secret put JWT_SECRET --env production
# npx wrangler secret put DATABASE_URL --env production
#
# Never store secrets inside wrangler.toml